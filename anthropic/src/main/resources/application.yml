spring:
  application:
    name: cert-alert
  datasource:
    url: jdbc:h2:mem:certalert;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2
  servlet:
    multipart:
      max-file-size: 512KB
      max-request-size: 1MB

server:
  port: 8080
  error:
    include-message: always

cert-alert:
  # HS256 secret used to sign dev JWTs. Override in production via env var.
  jwt:
    secret: ${CERT_ALERT_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    ttl-minutes: 60
    issuer: cert-alert
  alert:
    # Default number of days before expiry to flag a certificate.
    default-threshold-days: 30
    # Cron for the scheduled scan. Default: every day at 08:00.
    scan-cron: "0 0 8 * * *"
  url-fetch:
    # SSRF guard. Disable only in trusted environments.
    block-private-networks: true
    connect-timeout-ms: 5000
    read-timeout-ms: 5000

logging:
  level:
    com.example.certalert: INFO
    org.springframework.security: INFO
