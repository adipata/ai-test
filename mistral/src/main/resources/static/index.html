<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Alert Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .certificate-card {
            margin-bottom: 15px;
        }
        .expiring-soon {
            border-left: 4px solid #dc3545;
        }
        .expired {
            border-left: 4px solid #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Certificate Alert Service</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Certificates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alerts.html">Alerts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin.html">Admin</a>
                    </li>
                </ul>
                <div id="userInfo" class="navbar-text">
                    Not logged in
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Certificate Management</h2>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Upload Certificate
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="certFile" class="form-label">Certificate File (.cer, .pem)</label>
                                <input class="form-control" type="file" id="certFile" required>
                            </div>
                            <div class="mb-3">
                                <label for="groupSelect" class="form-label">Group</label>
                                <select class="form-select" id="groupSelect" required>
                                    <option value="">Select a group</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Upload</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Fetch from URL
                    </div>
                    <div class="card-body">
                        <form id="fetchForm">
                            <div class="mb-3">
                                <label for="certUrl" class="form-label">URL</label>
                                <input type="url" class="form-control" id="certUrl" 
                                       placeholder="https://example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="fetchGroupSelect" class="form-label">Group</label>
                                <select class="form-select" id="fetchGroupSelect" required>
                                    <option value="">Select a group</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Fetch</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Certificates</span>
                <div>
                    <button class="btn btn-sm btn-outline-secondary" id="showAllBtn">Show All</button>
                    <button class="btn btn-sm btn-outline-danger" id="showExpiringBtn">Expiring Soon</button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Group</th>
                                <th>Expiry Date</th>
                                <th>Days Left</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="certificatesTableBody">
                            <tr>
                                <td colspan="6" class="text-center">Loading certificates...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
