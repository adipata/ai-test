<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Certificate Alert Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .navbar {
            margin-bottom: 20px;
        }
        .alert-card {
            margin-bottom: 15px;
        }
        .alert-critical {
            border-left: 4px solid #dc3545;
        }
        .alert-warning {
            border-left: 4px solid #ffc107;
        }
        .alert-info {
            border-left: 4px solid #0dcaf0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Certificate Alert Service</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Certificates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/alerts.html">Alerts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin.html">Admin</a>
                    </li>
                </ul>
                <div id="userInfo" class="navbar-text">
                    Not logged in
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Alert Dashboard</h2>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-header">Critical Alerts</div>
                    <div class="card-body">
                        <h5 class="card-title" id="criticalAlertCount">0</h5>
                        <p class="card-text">Certificates expiring in &lt; 7 days</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-header">Warning Alerts</div>
                    <div class="card-body">
                        <h5 class="card-title" id="warningAlertCount">0</h5>
                        <p class="card-text">Certificates expiring in 7-30 days</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-header">Monitored Certificates</div>
                    <div class="card-body">
                        <h5 class="card-title" id="monitoredCertCount">0</h5>
                        <p class="card-text">Total certificates being monitored</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Active Alerts</span>
                <div>
                    <button class="btn btn-sm btn-outline-secondary" id="showAllAlertsBtn">Show All</button>
                    <button class="btn btn-sm btn-outline-danger" id="showCriticalAlertsBtn">Critical Only</button>
                </div>
            </div>
            <div class="card-body">
                <div id="alertsContainer">
                    <div class="alert alert-info">
                        Loading alerts...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/alerts.js"></script>
</body>
</html>
